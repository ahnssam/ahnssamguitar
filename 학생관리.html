<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>학생 관리 · 기타나무숲 (로컬)</title>
<style>
:root{
  --green-dark:#3a8a5c;--green-deep:#2a6b4a;--green-faint:#e2f5ea;--green-light:#72c492;--green-mid:#52a872;--green-pale:#b5e6c8;
  --ink:#243029;--ink-soft:#5a6b62;--line:#e4ece7;--bg:#f4f8f5;--red:#d8584f;--amber:#e0962f;--blue:#3f7fc4;--gray:#9aa8a0;
  --gold:#f0c419;--silver:#c2cdd6;--bronze:#d08a4e;--radius:14px;--shadow:0 4px 16px rgba(42,107,74,.08);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:'Noto Sans KR',system-ui,sans-serif;color:var(--ink);background:var(--bg);font-size:15px;line-height:1.5;padding-bottom:env(safe-area-inset-bottom)}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:15px}
.hidden{display:none!important}
#app{max-width:760px;margin:0 auto;padding:0 0 80px}
.topbar{position:sticky;top:0;z-index:30;background:rgba(244,248,245,.94);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--line)}
.topbar h1{margin:0;font-size:1.05rem;font-weight:900;color:var(--green-deep)}
.tb-actions{display:flex;gap:6px}
.tb-btn{background:#fff;border:1.5px solid var(--line);color:var(--green-deep);font-size:.74rem;font-weight:700;padding:6px 10px;border-radius:8px}
.tb-btn:hover{border-color:var(--green-mid)}
.view{padding:16px 16px 8px;animation:fade .18s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.view h2{font-size:1rem;margin:0 0 4px}
.view .dim{color:var(--ink-soft);font-size:.82rem;margin:0 0 14px}
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:40;display:flex;background:#fff;border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
.tabbar button{flex:1;background:none;border:none;padding:9px 0 7px;color:var(--gray);font-size:.7rem;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px}
.tabbar button .ic{font-size:1.2rem;line-height:1}
.tabbar button.on{color:var(--green-deep)}
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:11px;overflow:hidden}
.badge{font-size:.68rem;padding:2px 8px;border-radius:999px;font-weight:600}
.badge.출석{background:var(--green-faint);color:var(--green-deep)}
.badge.변동{background:#e7f0fb;color:var(--blue)}
.badge.쉼{background:#eef1f0;color:var(--gray)}
.badge.결석{background:#fbe6e4;color:var(--red)}
.badge.off{background:#eef1f0;color:var(--gray)}
.searchbar{display:flex;gap:8px;margin-bottom:12px}
.searchbar input{flex:1;padding:10px 13px;border:1.5px solid var(--line);border-radius:10px}
.searchbar input:focus{outline:none;border-color:var(--green-mid)}
.chip{padding:9px 13px;border:1.5px solid var(--line);background:#fff;border-radius:10px;font-size:.8rem;font-weight:600;color:var(--ink-soft);white-space:nowrap}
.chip.on{background:var(--green-deep);border-color:var(--green-deep);color:#fff}
.stu-row{display:flex;align-items:center;gap:11px;padding:13px 14px;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:9px}
.stu-row .av{width:38px;height:38px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--green-mid),var(--green-deep));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.95rem}
.stu-row .info{flex:1;min-width:0}
.stu-row .info small{display:block;color:var(--ink-soft);font-size:.74rem;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stu-row .arr{color:var(--gray)}
.trash-row .av{background:linear-gradient(135deg,#b9c2bd,#8a968f)!important}
.back-btn{background:none;border:none;color:var(--green-mid);font-weight:600;font-size:.85rem;padding:0;margin-bottom:10px}
.detail-head{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
.detail-head .nm{font-size:1.2rem;font-weight:900}
.detail-head .meta{color:var(--ink-soft);font-size:.82rem;margin-top:5px;line-height:1.7}
.sec-title{font-size:.84rem;font-weight:700;color:var(--green-deep);margin:18px 2px 9px;display:flex;align-items:center;justify-content:space-between}
.tl{position:relative;padding-left:16px}
.tl::before{content:'';position:absolute;left:4px;top:4px;bottom:4px;width:2px;background:var(--line)}
.tl-item{position:relative;padding:0 0 13px 6px}
.tl-item::before{content:'';position:absolute;left:-15px;top:5px;width:9px;height:9px;border-radius:50%;background:var(--green-mid);border:2px solid #fff}
.tl-item .d{font-size:.72rem;color:var(--gray)}
.tl-item .c{background:#fff;border-radius:10px;box-shadow:var(--shadow);padding:9px 12px;margin-top:3px;font-size:.86rem}
.tl-item .c .hw{color:var(--green-dark);font-size:.78rem;margin-top:4px}
.scorebar{display:flex;align-items:center;gap:8px;background:#fff;border-radius:10px;box-shadow:var(--shadow);padding:9px 12px;margin-bottom:7px}
.scorebar .cat{font-size:.8rem;font-weight:600;flex:1}
.scorebar .sc{font-weight:900;color:var(--green-deep);font-size:1.05rem}
.scorebar .sc small{font-weight:400;color:var(--gray);font-size:.68rem}
.row-btn{display:flex;gap:8px;align-items:center}
.mini{padding:7px 14px;border:none;border-radius:8px;background:var(--green-deep);color:#fff;font-weight:700;font-size:.8rem}
.mini.ghost{background:#fff;border:1.5px solid var(--line);color:var(--ink-soft)}
.mini.danger{background:var(--red);color:#fff}
.empty{text-align:center;color:var(--gray);padding:34px 10px;font-size:.86rem}
.fab{position:fixed;right:max(16px,calc((100vw - 760px)/2 + 16px));bottom:78px;z-index:35;width:52px;height:52px;border-radius:50%;border:none;background:var(--green-deep);color:#fff;font-size:1.6rem;box-shadow:0 6px 18px rgba(42,107,74,.35)}
/* leaderboard */
.lb-row{display:flex;align-items:center;gap:12px;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:12px 15px;margin-bottom:8px}
.lb-row .rk{width:30px;font-weight:900;font-size:1.1rem;text-align:center;color:var(--gray)}
.lb-row.r1{background:linear-gradient(95deg,#fff8e1,#fff);border:1.5px solid var(--gold)}
.lb-row.r2{background:linear-gradient(95deg,#f4f7fa,#fff);border:1.5px solid var(--silver)}
.lb-row.r3{background:linear-gradient(95deg,#fdf1e7,#fff);border:1.5px solid var(--bronze)}
.lb-row .nm{flex:1;font-weight:700}
.lb-row .nm small{display:block;font-weight:400;color:var(--gray);font-size:.7rem}
.lb-row .val{font-weight:900;color:var(--green-deep);font-size:1.15rem}
.lb-actions{display:flex;justify-content:flex-end;margin-bottom:10px}
.lb-input-row{display:flex;align-items:center;gap:11px;background:#fff;border-radius:12px;box-shadow:var(--shadow);padding:8px 13px;margin-bottom:7px}
.lb-input-row .rk{width:28px;text-align:center;font-weight:900;color:var(--gray)}
.lb-input-row .nm{flex:1;font-weight:700;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-score-input{width:82px;padding:8px 10px;border:1.5px solid var(--line);border-radius:9px;text-align:center;font-weight:800;font-size:1.02rem;color:var(--green-deep)}
.lb-score-input:focus{outline:none;border-color:var(--green-mid);box-shadow:0 0 0 3px rgba(82,168,114,.14)}
.lb-sub{font-size:.78rem;color:var(--gray);font-weight:700;margin:15px 2px 8px}
/* agenda + calendar */
.cal-modes{display:flex;gap:8px;margin-bottom:12px}
.cal-frame{width:100%;height:60vh;min-height:380px;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff;box-shadow:var(--shadow)}
.cal-frame iframe{width:100%;height:100%;border:0;display:block}
.cal-help{font-size:.76rem;color:var(--ink-soft);margin-top:10px;line-height:1.6}
.cal-side{display:block}
#miniCalBox{display:none}
.mc{background:#fff;border-radius:12px;box-shadow:var(--shadow);padding:12px}
.mc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.mc-title{font-weight:700;font-size:.9rem;color:var(--green-deep)}
.mc-nav{background:none;border:none;font-size:1.15rem;color:var(--ink-soft);padding:0 8px;border-radius:6px}
.mc-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.mc-cell{height:30px;display:flex;align-items:center;justify-content:center;font-size:.78rem;border-radius:7px}
.mc-wdh{color:var(--ink-soft);font-weight:600;font-size:.7rem;height:22px}
.mc-sun{color:var(--red)}
.mc-day{cursor:pointer}
.mc-day:hover{background:var(--green-faint)}
.mc-today{background:var(--green-deep);color:#fff;font-weight:700}
.mc-today.mc-sun{color:#fff}
.mc-empty{visibility:hidden}
.ag-day{margin-bottom:14px}
.ag-dhead{font-size:.82rem;font-weight:700;color:var(--green-deep);padding:6px 2px;border-bottom:1.5px solid var(--green-faint);margin-bottom:8px}
.ag-dhead b{color:var(--green-dark)}
.ag-empty{color:var(--gray);font-size:.76rem;padding:0 2px 4px}
.ag-card{background:#fff;border-radius:11px;box-shadow:var(--shadow);padding:10px 12px;margin-bottom:7px}
.ag-top{display:flex;align-items:center;gap:8px}
.ag-nm{flex:1;font-weight:700;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ag-time{font-weight:500;color:var(--ink-soft);font-size:.78rem}
.ag-cnt{font-size:.72rem;font-weight:700;color:var(--green-deep);background:var(--green-faint);border-radius:999px;padding:2px 9px;white-space:nowrap}
.ag-cnt.reg{background:#fbe6e4;color:var(--red)}
.ag-dates{font-size:.74rem;color:var(--ink-soft);margin:5px 0 2px}
.ag-btns{display:flex;gap:5px;margin-top:8px}
.ag-b{flex:1;padding:7px 0;border:1.5px solid var(--line);background:#fff;border-radius:8px;font-size:.78rem;font-weight:600;color:var(--ink-soft)}
.ag-b.sel.출석{background:var(--green-deep);border-color:var(--green-deep);color:#fff}
.ag-b.sel.변동{background:var(--blue);border-color:var(--blue);color:#fff}
.ag-b.sel.쉼{background:var(--gray);border-color:var(--gray);color:#fff}
.ag-b.sel.결석{background:var(--red);border-color:var(--red);color:#fff}
/* modal + form */
.form-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:15px;margin-bottom:14px}
.form-card .f{margin-bottom:9px}
.form-card label{font-size:.74rem;color:var(--ink-soft);font-weight:600;display:block;margin:0 0 3px 2px}
.form-card input,.form-card select,.form-card textarea{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:9px}
.form-card input:focus,.form-card select:focus,.form-card textarea:focus{outline:none;border-color:var(--green-mid)}
.modal-bg{position:fixed;inset:0;background:rgba(20,30,25,.45);z-index:60;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:760px;max-height:88dvh;overflow:auto;padding:20px 18px calc(20px + env(safe-area-inset-bottom))}
.modal h3{margin:0 0 14px;font-size:1.05rem}
.modal-actions{display:flex;gap:8px;margin-top:6px}
.modal-actions button{flex:1;padding:12px;border-radius:10px;font-weight:700;border:none}
.modal-actions .cancel{background:#eef1f0;color:var(--ink-soft)}
.modal-actions .ok{background:var(--green-deep);color:#fff}
@media(min-width:760px){.modal{border-radius:18px;margin-bottom:auto;align-self:center}.modal-bg{align-items:center}}
@media(min-width:1000px){
  #app.cal-wide{max-width:none}
  #app.cal-wide #viewCal{padding:16px 16px 10px 18px}
  #app.cal-wide .cal-layout{display:flex;gap:18px;align-items:flex-start}
  #app.cal-wide .cal-side{display:block;width:340px;flex-shrink:0;position:sticky;top:62px;max-height:calc(100vh - 76px);overflow:auto}
  #app.cal-wide #miniCalBox{display:block;margin-bottom:14px}
  #app.cal-wide .cal-main{flex:1;min-width:0}
  #app.cal-wide .cal-frame{height:calc(100vh - 150px);min-height:520px}
}
</style>
</head>
<body>

  <div class="topbar">
    <h1 id="vtitle">리더보드</h1>
    <div class="tb-actions"><button id="btnExport" class="tb-btn">⬇ 백업</button><button id="btnImport" class="tb-btn">⬆ 가져오기</button></div>

</div>

<script>
(function(){
'use strict';
const CATEGORIES=['NEW크로매틱','메이저스케일','X크로매틱','메이저4묶음','펜타토닉'];
const STATUSES=['출석','변동','쉼','결석'];
const CAL_SRC='steveq2568@gmail.com';
const LSKEY='gtns_admin_v1';

let DB=load();
function load(){
  try{const r=localStorage.getItem(LSKEY);if(r)return JSON.parse(r);}catch(e){}
  const seed=window.__SEED__||{students:[],lessons:[],payments:[],skills:[]};
  ['students','lessons','payments','skills'].forEach(k=>{if(!Array.isArray(seed[k]))seed[k]=[];});
  try{localStorage.setItem(LSKEY,JSON.stringify(seed));}catch(e){}
  return seed;
}
function save(){try{localStorage.setItem(LSKEY,JSON.stringify(DB));}catch(e){alert('저장 실패: 저장공간이 부족할 수 있어요. 백업 후 정리하세요.');}}
function uid(){return 'id'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);}

const $=s=>document.querySelector(s);
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const pad=n=>String(n).padStart(2,'0');
const dStr=d=>d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
const todayStr=()=>dStr(new Date());
const WD=['일','월','화','수','목','금','토'];
const fmtFull=s=>{if(!s)return'';const dt=new Date(s+'T00:00');return s+' ('+WD[dt.getDay()]+')';};
const initial=n=>(n||'?').replace(/\(.*\)/,'').replace(/\/.*/,'').trim().slice(0,1);
function parseSched(text){
  if(!text)return[];const out=[];
  String(text).split(/[,/·;\n]+/).forEach(p=>{
    const wch=(p.match(/[일월화수목금토]/)||[])[0];if(!wch)return;
    const tm=p.match(/(\d{1,2})\s*[:시]\s*(\d{1,2})?/);
    let hh=null,mm=0,time='';
    if(tm){hh=+tm[1];mm=tm[2]?+tm[2]:0;time=pad(hh)+':'+pad(mm);}
    out.push({dow:WD.indexOf(wch),hh,mm,time});
  });
  return out;
}

let currentTab='board',boardCat='NEW크로매틱',boardInput=false,calMode='WEEK';
function switchTab(t){currentTab=t;document.querySelectorAll('.tabbar button').forEach(b=>b.classList.toggle('on',b.dataset.tab===t));renderTab();}
document.querySelectorAll('.tabbar button').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)));
function renderTab(){
  ['Board','Cal','Students'].forEach(v=>$('#view'+v).classList.add('hidden'));
  $('#fab').classList.add('hidden');
  $('#app').classList.toggle('cal-wide',currentTab==='cal');
  if(currentTab==='board'){$('#vtitle').textContent='리더보드';$('#viewBoard').classList.remove('hidden');renderBoard();}
  if(currentTab==='cal'){$('#vtitle').textContent='수업 · 캘린더';$('#viewCal').classList.remove('hidden');renderCal();}
  if(currentTab==='students'){$('#vtitle').textContent='학생';$('#viewStudents').classList.remove('hidden');$('#fab').classList.remove('hidden');renderStudents();}
}

/* ===== 리더보드 ===== */
function renderBoard(){
  const v=$('#viewBoard');
  v.innerHTML='<div class="searchbar" style="overflow-x:auto" id="catChips"></div><div class="lb-actions"><button class="chip'+(boardInput?' on':'')+'" id="lbTog">'+(boardInput?'✓ 입력 끝내기':'✏️ 점수 입력')+'</button></div><div id="boardList"></div>';
  const chips=$('#catChips');
  CATEGORIES.forEach(c=>{const b=el('button','chip'+(c===boardCat?' on':''),c);b.onclick=()=>{boardCat=c;renderBoard();};chips.appendChild(b);});
  $('#lbTog').onclick=()=>{boardInput=!boardInput;renderBoard();};
  const best={};
  DB.skills.filter(r=>r.category===boardCat&&r.score!=null).forEach(r=>{if(best[r.student_id]==null||r.score>best[r.student_id].score)best[r.student_id]={score:r.score,memo:r.memo};});
  const ranked=Object.keys(best).map(sid=>{const s=DB.students.find(x=>x.id===sid);return s&&s.active&&!s.deleted?{id:sid,name:s.name,score:best[sid].score,memo:best[sid].memo}:null;}).filter(Boolean).sort((a,b)=>b.score-a.score);
  const box=$('#boardList');box.innerHTML='';
  if(!boardInput){
    if(!ranked.length){box.innerHTML='<div class="empty">'+esc(boardCat)+' 기록이 아직 없습니다. ‘✏️ 점수 입력’으로 추가하세요.</div>';return;}
    ranked.forEach((r,i)=>{const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);const row=el('div','lb-row'+(i<3?' r'+(i+1):''));row.innerHTML='<div class="rk">'+medal+'</div><div class="nm">'+esc(r.name)+(r.memo?'<small>'+esc(r.memo)+'</small>':'')+'</div><div class="val">'+r.score+'</div>';box.appendChild(row);});
    return;
  }
  const scored=new Set(ranked.map(r=>r.id));
  const noScore=DB.students.filter(s=>s.active&&!s.deleted&&!scored.has(s.id)).sort((a,b)=>a.name.localeCompare(b.name,'ko'));
  function mk(id,name,score,rank){
    const row=el('div','lb-input-row');row.appendChild(el('div','rk',rank||''));row.appendChild(el('div','nm',esc(name)));
    const inp=document.createElement('input');inp.className='lb-score-input';inp.type='number';inp.inputMode='numeric';inp.placeholder='-';if(score!=null)inp.value=score;
    const dosave=()=>{const raw=inp.value.trim();if(raw===''||isNaN(parseInt(raw,10)))return;const n=parseInt(raw,10);if(score!=null&&n===score)return;DB.skills.push({id:uid(),student_id:id,date:todayStr(),category:boardCat,score:n,memo:null});save();renderBoard();};
    inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();inp.blur();}});
    inp.addEventListener('change',dosave);row.appendChild(inp);return row;
  }
  ranked.forEach((r,i)=>{const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);box.appendChild(mk(r.id,r.name,r.score,medal));});
  if(noScore.length){box.appendChild(el('div','lb-sub','기록 없음 · 숫자 입력 후 Enter'));noScore.forEach(s=>box.appendChild(mk(s.id,s.name,null,'')));}
}

/* ===== 수업 (아젠다 + 구글 캘린더) ===== */
function calUrl(mode){const p=new URLSearchParams({src:CAL_SRC,ctz:'Asia/Seoul',mode:mode,wkst:'1',showTitle:'0',showPrint:'0',showCalendars:'0',showTz:'0',showTabs:'0'});return 'https://calendar.google.com/calendar/embed?'+p.toString();}
let calNavYM=null;
function miniCalHtml(){
  const now=new Date();if(!calNavYM)calNavYM={y:now.getFullYear(),m:now.getMonth()};
  const y=calNavYM.y,m=calNavYM.m,startDow=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),tStr=todayStr();
  let cells='';for(let i=0;i<startDow;i++)cells+='<div class="mc-cell mc-empty"></div>';
  for(let d=1;d<=dim;d++){const ds=y+'-'+pad(m+1)+'-'+pad(d);const dow=new Date(y,m,d).getDay();cells+='<div class="mc-cell mc-day'+(ds===tStr?' mc-today':'')+(dow===0?' mc-sun':'')+'" data-d="'+y+'/'+(m+1)+'/'+d+'">'+d+'</div>';}
  return '<div class="mc"><div class="mc-head"><button class="mc-nav" data-nav="-1">‹</button><span class="mc-title">'+y+'년 '+(m+1)+'월</span><button class="mc-nav" data-nav="1">›</button></div><div class="mc-grid">'+WD.map((w,i)=>'<div class="mc-cell mc-wdh'+(i===0?' mc-sun':'')+'">'+w+'</div>').join('')+'</div><div class="mc-grid">'+cells+'</div></div>';
}
function drawMiniCal(){
  const box=$('#miniCalBox');if(!box)return;box.innerHTML=miniCalHtml();
  box.querySelectorAll('[data-nav]').forEach(b=>b.onclick=()=>{calNavYM.m+=parseInt(b.dataset.nav,10);if(calNavYM.m<0){calNavYM.m=11;calNavYM.y--;}else if(calNavYM.m>11){calNavYM.m=0;calNavYM.y++;}drawMiniCal();});
  box.querySelectorAll('[data-d]').forEach(c=>c.onclick=()=>{const a=c.dataset.d.split('/');window.open('https://calendar.google.com/calendar/u/0/r/day/'+a[0]+'/'+a[1]+'/'+a[2],'_blank','noopener');});
}
function renderCal(){
  const v=$('#viewCal');
  const modes=[['WEEK','주'],['MONTH','월'],['AGENDA','일정']];
  v.innerHTML='<div class="cal-modes" id="calModes">'+modes.map(mo=>'<button class="chip'+(mo[0]===calMode?' on':'')+'" data-mode="'+mo[0]+'">'+mo[1]+'</button>').join('')+'</div><div class="cal-layout"><aside class="cal-side"><div id="miniCalBox"></div><div id="agendaBox"></div></aside><div class="cal-main"><div class="cal-frame"><iframe src="'+calUrl(calMode)+'" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe></div><p class="cal-help">구글 캘린더는 인터넷 연결 시에만 표시됩니다. 왼쪽(좁은 화면에선 위) 아젠다는 오프라인에서도 동작해요. 한 타임 = 50분.</p></div></div>';
  v.querySelectorAll('#calModes [data-mode]').forEach(b=>b.addEventListener('click',()=>{calMode=b.dataset.mode;renderCal();}));
  drawMiniCal();renderAgenda();
}
function lastPayMap(){const m={};DB.payments.forEach(p=>{if(!m[p.student_id]||p.date>m[p.student_id])m[p.student_id]=p.date;});return m;}
function cycleDates(sid,lastPay){const lp=lastPay[sid]||'0000-00-00';return DB.lessons.filter(l=>l.student_id===sid&&l.status==='출석'&&l.date>lp).map(l=>l.date).sort();}
function setLesson(sid,date,patch){let l=DB.lessons.find(x=>x.student_id===sid&&x.date===date);if(l)Object.assign(l,patch);else DB.lessons.push(Object.assign({id:uid(),student_id:sid,date:date,status:'출석',content:null,homework:null,memo:null},patch));save();}
function renderAgenda(){
  const box=$('#agendaBox');if(!box)return;
  const lastPay=lastPayMap();const statusMap={};DB.lessons.forEach(l=>{statusMap[l.student_id+'|'+l.date]=l.status;});
  const actives=DB.students.filter(s=>s.active&&!s.deleted).map(s=>({s:s,ent:parseSched(s.lesson_time)}));
  const today=new Date();today.setHours(0,0,0,0);let html='';
  for(let i=0;i<8;i++){
    const d=new Date(today);d.setDate(today.getDate()+i);const ds=dStr(d),dow=d.getDay();
    const list=actives.filter(x=>x.ent.some(e=>e.dow===dow)).map(x=>{const e=x.ent.find(e=>e.dow===dow);return{s:x.s,hh:e.hh,mm:e.mm,time:e.time};}).sort((a,b)=>((a.hh==null?9999:a.hh*60+a.mm)-(b.hh==null?9999:b.hh*60+b.mm)));
    const label=i===0?'오늘':i===1?'내일':'';
    html+='<div class="ag-day"><div class="ag-dhead">'+(label?'<b>'+label+'</b> · ':'')+(d.getMonth()+1)+'/'+d.getDate()+' ('+WD[dow]+')</div>';
    if(!list.length)html+='<div class="ag-empty">수업 없음</div>';
    else list.forEach(t=>{const cyc=cycleDates(t.s.id,lastPay);const cnt=cyc.length,reg=cnt>=4;const cur=statusMap[t.s.id+'|'+ds]||'';const dates=cyc.map(x=>{const a=x.split('-');return(+a[1])+'/'+(+a[2]);}).join(' · ');
      html+='<div class="ag-card" data-sid="'+t.s.id+'" data-date="'+ds+'"><div class="ag-top"><div class="ag-nm">'+esc(t.s.name)+(t.time?' <span class="ag-time">'+t.time+'</span>':'')+'</div><span class="ag-cnt'+(reg?' reg':'')+'">'+(reg?'등록! ':'')+cnt+'/4</span></div>'+(dates?'<div class="ag-dates">출석 '+dates+'</div>':'')+'<div class="ag-btns">'+STATUSES.map(st=>'<button class="ag-b '+st+(cur===st?' sel':'')+'" data-st="'+st+'">'+st+'</button>').join('')+'</div></div>';});
    html+='</div>';
  }
  box.innerHTML=html;
  box.querySelectorAll('.ag-card').forEach(card=>{const sid=card.dataset.sid,date=card.dataset.date;card.querySelectorAll('.ag-b').forEach(b=>{b.onclick=()=>{setLesson(sid,date,{status:b.dataset.st});renderAgenda();};});});
}

/* ===== 학생 ===== */
let stuQuery='',showInactive=false,showTrash=false;
function renderStudents(){
  const v=$('#viewStudents');const tc=DB.students.filter(s=>s.deleted).length;
  v.innerHTML='<div class="searchbar"><input id="stuSearch" placeholder="이름 검색" value="'+esc(stuQuery)+'" '+(showTrash?'disabled':'')+'><button class="chip '+(showInactive?'on':'')+'" id="incBtn">휴원·종료</button><button class="chip '+(showTrash?'on':'')+'" id="trashBtn">🗑 휴지통'+(tc?' '+tc:'')+'</button></div><div id="stuList"></div>';
  $('#stuSearch').addEventListener('input',e=>{stuQuery=e.target.value;drawStuList();});
  $('#incBtn').addEventListener('click',()=>{showTrash=false;showInactive=!showInactive;renderStudents();});
  $('#trashBtn').addEventListener('click',()=>{showTrash=!showTrash;renderStudents();});
  drawStuList();
}
function drawStuList(){
  const box=$('#stuList');box.innerHTML='';
  if(showTrash){
    const del=DB.students.filter(s=>s.deleted);
    if(!del.length){box.innerHTML='<div class="empty">휴지통이 비어 있습니다.</div>';return;}
    del.forEach(s=>{const r=el('div','stu-row trash-row');r.innerHTML='<div class="av">'+esc(initial(s.name))+'</div><div class="info"><b>'+esc(s.name)+'</b> <span class="badge off">삭제됨</span><small>'+esc(s.memo||'')+'</small></div>';
      const acts=el('div','row-btn');const rest=el('button','mini ghost','복원');rest.onclick=()=>{s.deleted=false;save();renderStudents();};
      const pg=el('button','mini danger','영구삭제');pg.onclick=()=>{if(!confirm("'"+s.name+"' 영구 삭제할까요? 출석·실력·결제 기록까지 모두 사라집니다."))return;DB.students=DB.students.filter(x=>x.id!==s.id);DB.lessons=DB.lessons.filter(x=>x.student_id!==s.id);DB.skills=DB.skills.filter(x=>x.student_id!==s.id);DB.payments=DB.payments.filter(x=>x.student_id!==s.id);save();renderStudents();};
      acts.appendChild(rest);acts.appendChild(pg);r.appendChild(acts);box.appendChild(r);});
    return;
  }
  let list=DB.students.filter(s=>!s.deleted&&(showInactive?true:s.active));
  if(stuQuery.trim())list=list.filter(s=>s.name.includes(stuQuery.trim()));
  list.sort((a,b)=>(b.active-a.active)||a.name.localeCompare(b.name,'ko'));
  if(!list.length){box.innerHTML='<div class="empty">학생이 없습니다. 오른쪽 아래 ＋ 로 추가하세요.</div>';return;}
  list.forEach(s=>{const r=el('div','stu-row');const meta=[s.lesson_time,s.memo].filter(Boolean).join(' · ')||(s.start_date?('시작 '+s.start_date):'');
    r.innerHTML='<div class="av">'+esc(initial(s.name))+'</div><div class="info"><b>'+esc(s.name)+'</b>'+(!s.active?' <span class="badge off">종료</span>':'')+'<small>'+esc(meta)+'</small></div><div class="arr">›</div>';
    r.onclick=()=>openDetail(s.id);box.appendChild(r);});
}
function openDetail(id){
  const s=DB.students.find(x=>x.id===id);if(!s)return;
  const v=$('#viewStudents');
  const lessons=DB.lessons.filter(l=>l.student_id===id).sort((a,b)=>b.date.localeCompare(a.date));
  const skills=DB.skills.filter(k=>k.student_id===id).sort((a,b)=>b.date.localeCompare(a.date));
  const pays=DB.payments.filter(p=>p.student_id===id).sort((a,b)=>b.date.localeCompare(a.date));
  const lastPay=lastPayMap();const cyc=cycleDates(id,lastPay);
  const best={};skills.forEach(r=>{if(r.score!=null&&(best[r.category]==null||r.score>best[r.category]))best[r.category]=r.score;});
  const bestHtml=Object.keys(best).length?Object.keys(best).map(c=>'<div class="scorebar"><span class="cat">'+esc(c)+'</span><span class="sc">'+best[c]+'<small> 템포</small></span></div>').join(''):'<div class="empty">실력 기록 없음</div>';
  v.innerHTML='<button class="back-btn" id="backBtn">‹ 목록</button>'
    +'<div class="detail-head"><div class="nm">'+esc(s.name)+'</div><div class="meta">'
    +(s.lesson_time?'🕒 '+esc(s.lesson_time)+'<br>':'')+(s.phone?'📞 '+esc(s.phone)+'<br>':'')
    +'🔁 이번 회차 <b>'+cyc.length+'/4</b>'+(cyc.length>=4?' <span style="color:var(--red);font-weight:700">· 등록 안내</span>':'')+'<br>'
    +(s.memo?'📝 '+esc(s.memo)+'<br>':'')+'상태: <b>'+(s.active?'수강중':'종료/휴원')+'</b></div>'
    +'<div class="row-btn" style="margin-top:10px;flex-wrap:wrap"><button class="mini ghost" id="editStu">정보 수정</button><button class="mini ghost" id="togA">'+(s.active?'휴원·종료':'다시 수강중')+'</button><button class="mini ghost" id="delStu" style="color:var(--red);border-color:#f0cbc7">🗑 삭제</button></div></div>'
    +'<div class="sec-title">현재 최고 기록 <button class="mini" id="addSkill">＋ 실력</button></div><div>'+bestHtml+'</div>'
    +'<div class="sec-title">출석 · 수업일지 <span style="color:var(--gray);font-weight:400">'+lessons.length+'건</span></div><div class="tl">'+(lessons.length?lessons.map(l=>'<div class="tl-item"><div class="d">'+fmtFull(l.date)+' · <b style="color:var(--ink)">'+esc(l.status)+'</b></div>'+((l.content||l.homework)?'<div class="c">'+(l.content?esc(l.content):'<span style="color:var(--gray)">내용 없음</span>')+(l.homework?'<div class="hw">▶ 과제: '+esc(l.homework)+'</div>':'')+'</div>':'')+'</div>').join(''):'<div class="empty">기록 없음</div>')+'</div>'
    +'<div class="sec-title">실력 기록 <span style="color:var(--gray);font-weight:400">'+skills.length+'건</span></div><div class="tl">'+(skills.length?skills.map(r=>'<div class="tl-item"><div class="d">'+fmtFull(r.date)+'</div><div class="c"><b>'+esc(r.category)+'</b> · <span style="color:var(--green-deep);font-weight:900">'+(r.score!=null?r.score:'-')+'</span>'+(r.memo?' <span style="color:var(--gray);font-size:.8rem">('+esc(r.memo)+')</span>':'')+'</div></div>').join(''):'<div class="empty">기록 없음</div>')+'</div>'
    +'<div class="sec-title">수업료 <button class="mini" id="addPay">＋ 결제</button></div><div class="tl">'+(pays.length?pays.map(p=>'<div class="tl-item"><div class="d">'+fmtFull(p.date)+'</div><div class="c"><b>'+p.amount+'만원</b>'+(p.method?' · '+esc(p.method):'')+(p.memo?' · '+esc(p.memo):'')+'</div></div>').join(''):'<div class="empty">기록 없음</div>')+'</div><div style="height:30px"></div>';
  $('#backBtn').onclick=()=>renderStudents();
  $('#editStu').onclick=()=>studentModal(s);
  $('#addSkill').onclick=()=>skillModal(s);
  $('#addPay').onclick=()=>payModal(s);
  $('#togA').onclick=()=>{s.active=!s.active;save();openDetail(id);};
  $('#delStu').onclick=()=>{if(!confirm("'"+s.name+"' 학생을 휴지통으로 보낼까요?\n나중에 휴지통에서 복원할 수 있어요."))return;s.deleted=true;save();showTrash=false;renderStudents();};
}
function modal(title,inner,onOk){
  const root=$('#modalRoot');
  root.innerHTML='<div class="modal-bg"><div class="modal"><h3>'+esc(title)+'</h3>'+inner+'<div class="modal-actions"><button class="cancel">취소</button><button class="ok">저장</button></div></div></div>';
  const close=()=>root.innerHTML='';
  root.querySelector('.modal-bg').onclick=e=>{if(e.target===root.querySelector('.modal-bg'))close();};
  root.querySelector('.cancel').onclick=close;
  root.querySelector('.ok').onclick=()=>{if(onOk(root)!==false)close();};
}
function studentModal(s){
  s=s||null;const cur=s||{};
  modal(s?'학생 정보 수정':'학생 추가',
    '<div class="form-card" style="box-shadow:none;padding:0"><div class="f"><label>이름 *</label><input id="m_name" value="'+esc(cur.name||'')+'"></div><div class="f"><label>연락처</label><input id="m_phone" value="'+esc(cur.phone||'')+'"></div><div class="f"><label>요일·시간 (예: 월 19:00, 목 14:30)</label><input id="m_time" value="'+esc(cur.lesson_time||'')+'"></div><div class="f"><label>메모</label><textarea id="m_memo">'+esc(cur.memo||'')+'</textarea></div></div>',
    root=>{const name=root.querySelector('#m_name').value.trim();if(!name){alert('이름을 입력하세요');return false;}
      const rec={name:name,phone:root.querySelector('#m_phone').value.trim()||null,lesson_time:root.querySelector('#m_time').value.trim()||null,memo:root.querySelector('#m_memo').value.trim()||null};
      if(s){Object.assign(s,rec);save();openDetail(s.id);}else{const ns=Object.assign({id:uid(),start_date:null,active:true,deleted:false},rec);DB.students.push(ns);save();renderStudents();}});
}
function skillModal(s){
  modal(s.name+' · 실력 기록 추가',
    '<div class="form-card" style="box-shadow:none;padding:0"><div class="f"><label>날짜</label><input id="m_date" type="date" value="'+todayStr()+'"></div><div class="f"><label>항목</label><select id="m_cat">'+CATEGORIES.map(c=>'<option>'+c+'</option>').join('')+'</select></div><div class="f"><label>점수(템포)</label><input id="m_score" type="number" inputmode="numeric" placeholder="예: 120"></div><div class="f"><label>메모</label><input id="m_memo" placeholder="선택"></div></div>',
    root=>{const sc=root.querySelector('#m_score').value;DB.skills.push({id:uid(),student_id:s.id,date:root.querySelector('#m_date').value,category:root.querySelector('#m_cat').value,score:sc===''?null:parseInt(sc,10),memo:root.querySelector('#m_memo').value.trim()||null});save();openDetail(s.id);});
}
function payModal(s){
  modal(s.name+' · 결제 추가',
    '<div class="form-card" style="box-shadow:none;padding:0"><div class="f"><label>날짜</label><input id="m_date" type="date" value="'+todayStr()+'"></div><div class="f"><label>금액(만원)</label><input id="m_amt" type="number" inputmode="numeric" placeholder="예: 24"></div><div class="f"><label>방식</label><select id="m_meth"><option>이체</option><option>카드</option><option>현금</option><option value="">기타</option></select></div><div class="f"><label>메모</label><input id="m_memo" placeholder="선택"></div></div>',
    root=>{const amt=root.querySelector('#m_amt').value;if(amt===''){alert('금액을 입력하세요');return false;}DB.payments.push({id:uid(),student_id:s.id,date:root.querySelector('#m_date').value,amount:parseInt(amt,10),method:root.querySelector('#m_meth').value||null,memo:root.querySelector('#m_memo').value.trim()||null});save();openDetail(s.id);});
}
$('#fab').addEventListener('click',()=>studentModal(null));

/* ===== 백업 ===== */
$('#btnExport').addEventListener('click',()=>{
  const blob=new Blob([JSON.stringify(DB)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='기타나무숲_백업_'+todayStr()+'.json';
  document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),3000);
});
$('#btnImport').addEventListener('click',()=>{
  const inp=document.createElement('input');inp.type='file';inp.accept='.json,application/json';
  inp.onchange=()=>{const f=inp.files&&inp.files[0];if(!f)return;const rd=new FileReader();
    rd.onload=()=>{try{const data=JSON.parse(rd.result);if(!data||!Array.isArray(data.students)){alert('올바른 백업 파일이 아니에요.');return;}if(!confirm('지금 데이터를 이 백업으로 덮어쓸까요?\n현재 데이터는 사라집니다.'))return;['students','lessons','payments','skills'].forEach(k=>{if(!Array.isArray(data[k]))data[k]=[];});DB=data;save();switchTab(currentTab);alert('복원 완료!');}catch(e){alert('읽기 실패: '+e.message);}};
    rd.readAsText(f);};
  inp.click();
});

switchTab('board');
})();
</script>
</body>
