<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#e2f5ea">
    <meta name="robots" content="noindex, nofollow">
    <title>프리셋 빌더 | 안쌤의 기타나무숲</title>
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --green-deep: #2a6b4a;
            --green-dark: #3a8a5c;
            --green-mid: #52a872;
            --green-light: #72c492;
            --green-pale: #b5e6c8;
            --green-faint: #e2f5ea;
            --bg: #f5fbf7;
            --card: #ffffff;
            --text: #1a2421;
            --text-mid: #4a5a52;
            --text-light: #7a8a82;
            --border: rgba(42, 107, 74, 0.18);
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 1rem;
            line-height: 1.45;
        }
        .bd-wrap { max-width: 880px; margin: 0 auto; }

        /* ───── Header ───── */
        .bd-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding: 1rem 1.2rem;
            background: var(--card);
            border-radius: 12px;
            border: 1px solid var(--border);
            gap: 1rem;
            flex-wrap: wrap;
        }
        .bd-header h1 {
            font-size: 1.25rem;
            color: var(--green-deep);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .bd-header h1 i { font-size: 1.1rem; }
        .bd-userinfo {
            font-size: 0.82rem;
            color: var(--text-mid);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .bd-userinfo button {
            padding: 0.32rem 0.7rem;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-mid);
            border-radius: 14px;
            cursor: pointer;
            font: inherit;
            font-size: 0.74rem;
        }
        .bd-userinfo button:hover {
            background: rgba(82, 168, 114, 0.1);
            color: var(--green-deep);
        }
        .bd-back {
            padding: 0.32rem 0.7rem;
            border: 1px solid var(--border);
            border-radius: 14px;
            text-decoration: none;
            color: var(--text-mid);
            font-size: 0.74rem;
        }
        .bd-back:hover { color: var(--green-deep); }

        /* ───── Card ───── */
        .bd-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.2rem;
            margin-bottom: 1rem;
        }
        .bd-section-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-light);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 0.6rem;
        }

        /* ───── Passcode gate ───── */
        .bd-gateCTA, .bd-loginCTA {
            text-align: center;
            padding: 2.5rem 1rem;
        }
        .bd-gateCTA p, .bd-loginCTA p { margin-bottom: 1rem; color: var(--text-mid); }
        .bd-passcode-row {
            display: flex;
            justify-content: center;
            gap: 0.55rem;
            margin: 1.2rem auto;
        }
        .bd-passcode-input {
            width: 56px;
            height: 64px;
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: #fff;
            color: var(--green-deep);
            outline: none;
            transition: border-color 0.15s;
        }
        .bd-passcode-input:focus {
            border-color: var(--green-mid);
            box-shadow: 0 0 0 3px rgba(82, 168, 114, 0.18);
        }
        .bd-passcode-input.error {
            border-color: #c44034;
            animation: bd-shake 0.4s;
        }
        @keyframes bd-shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
        .bd-gate-error {
            color: #b83a2e;
            font-size: 0.85rem;
            margin-top: 0.7rem;
            min-height: 1rem;
        }

        .bd-loginCTA button {
            padding: 0.75rem 1.4rem;
            background: var(--green-deep);
            color: #fff;
            border: none;
            border-radius: 22px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
        }
        .bd-loginCTA button:hover { background: var(--green-dark); }
        .bd-loginCTA .bd-tip {
            margin-top: 1rem;
            font-size: 0.78rem;
            color: var(--text-light);
        }

        /* ───── Preset list (with search) ───── */
        .bd-list-search-wrap {
            position: relative;
            margin-bottom: 0.7rem;
        }
        .bd-list-search-icon {
            position: absolute;
            left: 0.7rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: 0.85rem;
            pointer-events: none;
        }
        .bd-list-search {
            width: 100%;
            padding: 0.55rem 2rem 0.55rem 2.1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #fff;
            font-family: inherit;
            font-size: 0.88rem;
            color: var(--text);
            outline: none;
        }
        .bd-list-search:focus {
            border-color: var(--green-mid);
            box-shadow: 0 0 0 3px rgba(82, 168, 114, 0.15);
        }
        .bd-list-search-clear {
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            width: 22px; height: 22px;
            border-radius: 50%;
            border: none;
            background: rgba(42, 107, 74, 0.1);
            color: var(--text-mid);
            cursor: pointer;
            font-size: 0.7rem;
            display: none;
        }
        .bd-list-search-wrap.has-text .bd-list-search-clear { display: inline-flex; align-items: center; justify-content: center; }

        .bd-list { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 0.6rem; max-height: 320px; overflow-y: auto; }
        .bd-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(42, 107, 74, 0.04);
            cursor: pointer;
            transition: all 0.15s;
            gap: 0.7rem;
        }
        .bd-list-item:hover {
            background: rgba(82, 168, 114, 0.15);
            border-color: var(--green-mid);
        }
        .bd-list-item.selected {
            background: var(--green-deep);
            color: #fff;
            border-color: var(--green-deep);
        }
        .bd-list-item-name { font-weight: 600; }
        .bd-list-item-meta { font-size: 0.72rem; opacity: 0.72; }
        .bd-list-item.selected .bd-list-item-meta { opacity: 0.85; }

        /* ───── Form ───── */
        .bd-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
            align-items: stretch;
            margin-bottom: 0.7rem;
        }
        .bd-field {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 130px;
        }
        .bd-field label {
            font-size: 0.7rem;
            color: var(--text-mid);
            margin-bottom: 0.22rem;
            font-weight: 500;
            letter-spacing: 0.02em;
        }
        .bd-field input,
        .bd-field select {
            padding: 0.5rem 0.7rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #fff;
            color: var(--text);
            font-family: inherit;
            font-size: 0.88rem;
        }
        .bd-field input:focus,
        .bd-field select:focus {
            outline: none;
            border-color: var(--green-mid);
            box-shadow: 0 0 0 3px rgba(82, 168, 114, 0.15);
        }
        .bd-pills {
            display: inline-flex;
            background: rgba(42, 107, 74, 0.06);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 2px;
        }
        .bd-pill {
            padding: 0.35rem 0.7rem;
            border: none;
            background: transparent;
            color: var(--text-mid);
            border-radius: 16px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.78rem;
            font-weight: 500;
        }
        .bd-pill:hover:not(.active) {
            background: rgba(82, 168, 114, 0.15);
            color: var(--green-deep);
        }
        .bd-pill.active {
            background: var(--green-deep);
            color: #fff;
        }
        .bd-pills-stars .bd-pill { letter-spacing: 0; }
        .bd-pills-stars .bd-pill[data-diff="0"] { color: var(--text-light); }
        .bd-pills-stars .bd-pill:not([data-diff="0"]) { color: #d4a52a; font-size: 0.74rem; }
        .bd-pills-stars .bd-pill.active { color: #fff !important; }

        /* ───── Chord progression — loop-grid 스타일 (반주 메뉴와 동일한 룩) ─────
           tools.html 의 .loop-grid / .loop-cell / .loop-cell-half 룩을 그대로
           가져오되 클릭 picker 대신 텍스트 input 으로 입력. */
        .bd-chords-wrap {
            background: rgba(42, 107, 74, 0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.7rem;
        }
        .bd-loop-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 0.35rem;
        }
        .bd-loop-cell {
            position: relative;
            background: rgba(42, 107, 74, 0.03);
            border: 1px solid var(--border);
            border-radius: 8px;
            min-height: 76px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .bd-loop-cell-num {
            position: absolute;
            top: 4px;
            left: 7px;
            font-size: 0.72rem;
            color: var(--text-light);
            font-weight: 700;
            pointer-events: none;
        }
        .bd-loop-cell-halves {
            display: flex;
            flex: 1;
            margin-top: 1rem;
            min-height: 56px;
        }
        .bd-loop-cell-half-input {
            flex: 1;
            min-width: 0;
            border: none;
            background: transparent;
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text);
            outline: none;
            padding: 0.3rem 0.2rem;
            cursor: text;
        }
        .bd-loop-cell-half-input::placeholder {
            color: rgba(26, 36, 33, 0.25);
            font-weight: 500;
        }
        .bd-loop-cell-half-input:focus {
            background: rgba(82, 168, 114, 0.18);
            color: var(--green-deep);
        }
        .bd-loop-cell-half-input + .bd-loop-cell-half-input {
            border-left: 1px solid rgba(42, 107, 74, 0.1);
        }
        .bd-loop-cell-half-input.has-value {
            color: var(--green-deep);
        }
        .bd-chords-tip {
            margin-top: 0.55rem;
            font-size: 0.72rem;
            color: var(--text-light);
        }
        .bd-chords-tip code {
            background: rgba(42, 107, 74, 0.08);
            padding: 0.05rem 0.35rem;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            color: var(--green-deep);
        }

        /* ───── Action buttons ───── */
        .bd-actions {
            display: flex;
            gap: 0.55rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        .bd-btn {
            padding: 0.55rem 1rem;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.15s;
            text-decoration: none;
        }
        .bd-btn-primary { background: var(--green-deep); color: #fff; }
        .bd-btn-primary:hover { background: var(--green-dark); }
        .bd-btn-danger {
            background: rgba(196, 64, 52, 0.1);
            color: #b83a2e;
            border: 1px solid rgba(196, 64, 52, 0.3);
        }
        .bd-btn-danger:hover { background: rgba(196, 64, 52, 0.25); }
        .bd-btn-ghost {
            background: transparent;
            color: var(--green-deep);
            border: 1px solid rgba(42, 107, 74, 0.3);
        }
        .bd-btn-ghost:hover {
            background: rgba(82, 168, 114, 0.15);
            border-color: var(--green-mid);
        }

        /* ───── Feedback ───── */
        .bd-feedback {
            margin-top: 0.7rem;
            padding: 0.55rem 0.8rem;
            border-radius: 8px;
            font-size: 0.82rem;
            display: none;
        }
        .bd-feedback.success {
            display: block;
            background: rgba(82, 168, 114, 0.18);
            color: var(--green-deep);
            border: 1px solid rgba(82, 168, 114, 0.45);
        }
        .bd-feedback.error {
            display: block;
            background: rgba(196, 64, 52, 0.1);
            color: #b83a2e;
            border: 1px solid rgba(196, 64, 52, 0.35);
        }

        .bd-empty {
            text-align: center;
            color: var(--text-light);
            padding: 1.5rem;
            font-size: 0.85rem;
        }

        @media (max-width: 600px) {
            body { padding: 0.5rem; }
            .bd-card { padding: 0.9rem; }
            .bd-header h1 { font-size: 1.1rem; }
            .bd-row { gap: 0.5rem; }
            .bd-passcode-input { width: 48px; height: 56px; font-size: 1.5rem; }
            .bd-loop-cell { min-height: 68px; }
            .bd-loop-cell-half-input { font-size: 0.95rem; }
        }
    </style>
</head>
<body>
    <div class="bd-wrap">
        <div class="bd-header">
            <h1><i class="fas fa-music"></i> 프리셋 빌더</h1>
            <div class="bd-userinfo" id="userInfo">
                <a class="bd-back" href="tools.html">← 도구로</a>
                <span id="userEmail">잠금됨</span>
            </div>
        </div>

        <!-- Stage 1 — 패스코드 게이트 -->
        <div class="bd-card bd-gateCTA" id="gateCard">
            <p>관리자 전용 페이지입니다. 4자리 비밀번호를 입력하세요.</p>
            <div class="bd-passcode-row" id="passcodeRow">
                <input type="text" class="bd-passcode-input" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
                <input type="text" class="bd-passcode-input" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
                <input type="text" class="bd-passcode-input" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
                <input type="text" class="bd-passcode-input" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
            </div>
            <div class="bd-gate-error" id="gateError"></div>
        </div>

        <!-- Stage 2 — 로그인 (게이트 통과 후) -->
        <div class="bd-card bd-loginCTA" id="loginCard" style="display:none;">
            <p>비밀번호 통과! 등록된 계정(<code>steveq2568@gmail.com</code>)으로 로그인하세요.</p>
            <button id="loginBtn"><i class="fab fa-google"></i> Google로 로그인</button>
            <div class="bd-tip">로그인 후 프리셋 추가/편집/삭제 → DB 즉시 반영</div>
        </div>

        <!-- Stage 3 — 편집 화면 -->
        <div id="editorCard" style="display:none;">
            <div class="bd-card">
                <div class="bd-section-label">프리셋 목록</div>
                <div class="bd-list-search-wrap" id="listSearchWrap">
                    <i class="fas fa-search bd-list-search-icon"></i>
                    <input type="text" class="bd-list-search" id="listSearch" placeholder="검색…" autocomplete="off">
                    <button type="button" class="bd-list-search-clear" id="listSearchClear" aria-label="검색 지우기"><i class="fas fa-times"></i></button>
                </div>
                <div class="bd-list" id="presetList">
                    <div class="bd-empty">로딩중…</div>
                </div>
                <button class="bd-btn bd-btn-ghost" id="newBtn">
                    <i class="fas fa-plus"></i> 새 프리셋
                </button>
            </div>

            <div class="bd-card" id="editForm" style="display:none;">
                <div class="bd-section-label" id="formTitle">새 프리셋</div>

                <div class="bd-row">
                    <div class="bd-field">
                        <label>노래 이름 *</label>
                        <input type="text" id="fName" placeholder="예: Let It Be">
                    </div>
                    <div class="bd-field">
                        <label>아티스트</label>
                        <input type="text" id="fArtist" placeholder="예: Beatles">
                    </div>
                </div>

                <div class="bd-row">
                    <div class="bd-field" style="flex: 0 0 90px;">
                        <label>BPM</label>
                        <input type="number" id="fBpm" min="40" max="240" value="90">
                    </div>
                    <div class="bd-field" style="flex: 1 1 auto;">
                        <label>마디</label>
                        <div class="bd-pills" id="fBars">
                            <button class="bd-pill" data-bars="4" type="button">4</button>
                            <button class="bd-pill" data-bars="8" type="button">8</button>
                            <button class="bd-pill" data-bars="12" type="button">12</button>
                            <button class="bd-pill" data-bars="16" type="button">16</button>
                        </div>
                    </div>
                </div>

                <div class="bd-row">
                    <div class="bd-field" style="flex: 1 1 auto;">
                        <label>난이도</label>
                        <div class="bd-pills bd-pills-stars" id="fDifficulty">
                            <button class="bd-pill" data-diff="0" type="button">없음</button>
                            <button class="bd-pill" data-diff="1" type="button">★</button>
                            <button class="bd-pill" data-diff="2" type="button">★★</button>
                            <button class="bd-pill" data-diff="3" type="button">★★★</button>
                            <button class="bd-pill" data-diff="4" type="button">★★★★</button>
                            <button class="bd-pill" data-diff="5" type="button">★★★★★</button>
                        </div>
                    </div>
                </div>
                <div class="bd-row">
                    <div class="bd-field">
                        <label>장르</label>
                        <input type="text" id="fGenre" placeholder="예: 발라드, 팝, 락 …" autocomplete="off">
                    </div>
                </div>

                <div class="bd-row">
                    <div class="bd-field">
                        <label>드럼 리듬</label>
                        <select id="fRhythm">
                            <option value="8beat">8비트 A</option>
                            <option value="8beat2">8비트 B</option>
                            <option value="4beat">4비트 A</option>
                            <option value="4beat2">4비트 B</option>
                            <option value="16beat">16비트 A</option>
                            <option value="16beat2">16비트 B</option>
                            <option value="16beatC">16비트 C</option>
                            <option value="ballad">셔플락</option>
                        </select>
                    </div>
                    <div class="bd-field">
                        <label>베이스 스타일</label>
                        <select id="fBassStyle">
                            <option value="default">기본</option>
                            <option value="8beat">8비트</option>
                            <option value="16beat">16비트</option>
                        </select>
                    </div>
                    <div class="bd-field">
                        <label>피아노 스타일</label>
                        <select id="fPianoStyle">
                            <option value="quarter">4비트</option>
                            <option value="8beat">8비트</option>
                        </select>
                    </div>
                </div>

                <div class="bd-section-label" style="margin-top:1.1rem;">코드 진행</div>
                <div class="bd-chords-wrap">
                    <div class="bd-loop-grid" id="fChords"></div>
                    <div class="bd-chords-tip">
                        반주 메뉴와 동일한 그리드. 한 칸에 두 절반(앞/뒤)이 있어요.
                        타이핑 입력: <code>C</code>, <code>Am</code>, <code>F#m</code> 등.
                        뒷 절반 비우면 앞 절반이 마디 끝까지 이어짐.
                    </div>
                </div>

                <div class="bd-actions">
                    <button class="bd-btn bd-btn-primary" id="saveBtn">
                        <i class="fas fa-save"></i> 저장
                    </button>
                    <button class="bd-btn bd-btn-ghost" id="testBtn">
                        <i class="fas fa-play"></i> 반주에서 미리보기
                    </button>
                    <button class="bd-btn bd-btn-danger" id="deleteBtn" style="display:none;">
                        <i class="fas fa-trash"></i> 삭제
                    </button>
                </div>
                <div class="bd-feedback" id="feedback"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.74.0/dist/umd/supabase.min.js"></script>
    <script>
        (function() {
            'use strict';

            // ─── 설정 ───────────────────────────────────────────────
            const SUPABASE_URL = 'https://qpcbrqgqylxkgdwoflku.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_5rr-OZ7Sqjk1nXn59R7XnQ_HInATuSV';
            const ALLOWED_EMAIL = 'steveq2568@gmail.com';
            // 4자리 비밀번호. 변경하려면 이 줄 숫자만 바꾸면 됨.
            const PASSCODE = '2568';
            const GATE_LS_KEY = 'ahnsamPresetsGateOK';

            let sb = null;
            let presets = [];
            let editingId = null;
            let bars = 4;
            let listFilter = '';
            let difficulty = 0;  // 0 = 없음, 1~5 = 별 개수

            const $ = function(id) { return document.getElementById(id); };

            function escapeHtml(s) {
                return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
                    return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
                });
            }

            function showFeedback(msg, kind) {
                const el = $('feedback');
                el.textContent = msg;
                el.className = 'bd-feedback ' + kind;
                if (kind !== 'error') {
                    setTimeout(function() { el.className = 'bd-feedback'; }, 3500);
                }
            }

            // ═══════════════════════════════════════════════════════
            //  STAGE 1 — Passcode gate
            // ═══════════════════════════════════════════════════════
            function setupPasscodeGate() {
                if (localStorage.getItem(GATE_LS_KEY) === '1') {
                    passGate();
                    return;
                }
                const inputs = document.querySelectorAll('.bd-passcode-input');
                inputs.forEach(function(inp, idx) {
                    inp.addEventListener('input', function() {
                        // Allow only digits
                        inp.value = inp.value.replace(/[^0-9]/g, '');
                        if (inp.value && idx < inputs.length - 1) {
                            inputs[idx + 1].focus();
                        }
                        checkPasscode();
                    });
                    inp.addEventListener('keydown', function(e) {
                        if (e.key === 'Backspace' && !inp.value && idx > 0) {
                            inputs[idx - 1].focus();
                        }
                    });
                    inp.addEventListener('paste', function(e) {
                        e.preventDefault();
                        const txt = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '').slice(0, 4);
                        for (let i = 0; i < txt.length && i < inputs.length; i++) {
                            inputs[i].value = txt[i];
                        }
                        checkPasscode();
                    });
                });
                inputs[0].focus();

                function checkPasscode() {
                    const entered = Array.from(inputs).map(function(i) { return i.value; }).join('');
                    if (entered.length === 4) {
                        if (entered === PASSCODE) {
                            localStorage.setItem(GATE_LS_KEY, '1');
                            passGate();
                        } else {
                            inputs.forEach(function(i) {
                                i.classList.add('error');
                                i.value = '';
                            });
                            $('gateError').textContent = '비밀번호가 틀렸습니다';
                            setTimeout(function() {
                                inputs.forEach(function(i) { i.classList.remove('error'); });
                                inputs[0].focus();
                            }, 500);
                        }
                    }
                }
            }

            function passGate() {
                $('gateCard').style.display = 'none';
                $('loginCard').style.display = 'block';
                init();
            }

            // ═══════════════════════════════════════════════════════
            //  STAGE 2 — Auth
            // ═══════════════════════════════════════════════════════
            async function init() {
                if (!window.supabase) {
                    $('gateError').textContent = 'Supabase SDK 로드 실패';
                    return;
                }
                sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                sb.auth.onAuthStateChange(function(event, session) { renderAuth(session); });
                const result = await sb.auth.getSession();
                renderAuth(result.data.session);
            }

            function renderAuth(session) {
                const user = session && session.user;
                const isAdmin = user && user.email === ALLOWED_EMAIL;
                $('loginCard').style.display = isAdmin ? 'none' : 'block';
                $('editorCard').style.display = isAdmin ? 'block' : 'none';
                if (user) {
                    $('userEmail').innerHTML = escapeHtml(user.email) +
                        (isAdmin ? ' <span style="color:var(--green-deep);font-weight:600;">· 관리자</span>' :
                                   ' <span style="color:#b83a2e;">· 권한 없음</span>') +
                        ' <button id="logoutBtn">로그아웃</button>';
                    $('logoutBtn').onclick = logout;
                } else {
                    $('userEmail').textContent = '로그인 필요';
                }
                if (isAdmin) loadPresets();
            }

            async function startLogin() {
                await sb.auth.signInWithOAuth({
                    provider: 'google',
                    options: { redirectTo: window.location.href }
                });
            }
            async function logout() { await sb.auth.signOut(); }

            // ═══════════════════════════════════════════════════════
            //  STAGE 3 — Presets CRUD
            // ═══════════════════════════════════════════════════════
            async function loadPresets() {
                const res = await sb.from('presets')
                    .select('*')
                    .order('sort_order', { ascending: true })
                    .order('created_at', { ascending: true });
                if (res.error) {
                    $('presetList').innerHTML = '<div class="bd-empty">로딩 실패: ' + escapeHtml(res.error.message) + '</div>';
                    return;
                }
                presets = res.data || [];
                renderList();
            }

            // ─── Search ranking (tools.html 과 동일 로직) ───
            function _scoreMatch(haystack, needle) {
                if (!needle) return 1;
                if (!haystack) return 0;
                var h = haystack.toLowerCase();
                var n = needle.toLowerCase();
                if (h === n) return 1000;
                if (h.indexOf(n) === 0) return 700 - Math.min(99, h.length - n.length);
                var tokens = h.split(/\s+/);
                for (var i = 0; i < tokens.length; i++) {
                    if (tokens[i].indexOf(n) === 0) return 500 - i;
                }
                if (h.indexOf(n) !== -1) return 300;
                return 0;
            }

            function renderList() {
                const list = $('presetList');
                const f = (listFilter || '').trim();
                let filtered;
                if (!f) {
                    filtered = presets.slice();
                } else {
                    filtered = presets.map(function(p) {
                        var s1 = _scoreMatch(p.name, f);
                        var s2 = _scoreMatch(p.artist, f) * 0.6;
                        return { p: p, score: Math.max(s1, s2) };
                    }).filter(function(x) { return x.score > 0; })
                      .sort(function(a, b) { return b.score - a.score; })
                      .map(function(x) { return x.p; });
                }
                if (filtered.length === 0) {
                    list.innerHTML = '<div class="bd-empty">' +
                        (f ? '"' + escapeHtml(f) + '" 에 맞는 프리셋이 없어요'
                           : '아직 프리셋이 없어요. "새 프리셋" 으로 추가해보세요.') +
                        '</div>';
                    return;
                }
                list.innerHTML = '';
                filtered.forEach(function(p) {
                    const item = document.createElement('div');
                    item.className = 'bd-list-item' + (p.id === editingId ? ' selected' : '');
                    var stars = (p.difficulty && p.difficulty > 0) ? ' '.repeat(0) + '★'.repeat(p.difficulty) : '';
                    item.innerHTML =
                        '<div>' +
                            '<span class="bd-list-item-name">' + escapeHtml(p.name) + '</span>' +
                            (p.artist ? ' <span class="bd-list-item-meta">· ' + escapeHtml(p.artist) + '</span>' : '') +
                            (p.genre ? ' <span class="bd-list-item-meta">· ' + escapeHtml(p.genre) + '</span>' : '') +
                            (stars ? ' <span class="bd-list-item-meta" style="color:#d4a52a;">' + stars + '</span>' : '') +
                        '</div>' +
                        '<span class="bd-list-item-meta">' + p.bpm + ' BPM · ' + p.bars + '마디</span>';
                    item.onclick = function() { loadEdit(p); };
                    list.appendChild(item);
                });
            }

            // ─── Edit form ───
            function newPreset() {
                editingId = null;
                $('formTitle').textContent = '새 프리셋';
                $('fName').value = '';
                $('fArtist').value = '';
                $('fBpm').value = 90;
                $('fGenre').value = '';
                bars = 4;
                difficulty = 0;
                $('fRhythm').value = '8beat';
                $('fBassStyle').value = 'default';
                $('fPianoStyle').value = 'quarter';
                renderBars();
                renderDifficulty();
                renderChords({}, {});
                $('editForm').style.display = 'block';
                $('deleteBtn').style.display = 'none';
                $('feedback').className = 'bd-feedback';
                renderList();
                $('fName').focus();
                window.scrollTo({ top: $('editForm').offsetTop - 12, behavior: 'smooth' });
            }

            function loadEdit(p) {
                editingId = p.id;
                $('formTitle').textContent = '편집: ' + p.name;
                $('fName').value = p.name || '';
                $('fArtist').value = p.artist || '';
                $('fBpm').value = p.bpm || 90;
                $('fGenre').value = p.genre || '';
                bars = p.bars || 4;
                difficulty = p.difficulty || 0;
                $('fRhythm').value = p.rhythm || '8beat';
                $('fBassStyle').value = p.bass_style || 'default';
                $('fPianoStyle').value = p.piano_style || 'quarter';
                renderBars();
                renderDifficulty();
                renderChords(p.chords_a || {}, p.chords_b || {});
                $('editForm').style.display = 'block';
                $('deleteBtn').style.display = 'inline-flex';
                $('feedback').className = 'bd-feedback';
                renderList();
            }

            function renderDifficulty() {
                document.querySelectorAll('#fDifficulty .bd-pill').forEach(function(b) {
                    b.classList.toggle('active', parseInt(b.dataset.diff, 10) === difficulty);
                });
            }

            function renderBars() {
                document.querySelectorAll('#fBars .bd-pill').forEach(function(b) {
                    b.classList.toggle('active', parseInt(b.dataset.bars, 10) === bars);
                });
            }

            // ─── 코드 진행 그리드 (반주 메뉴와 동일한 룩, 입력은 타이핑) ───
            function renderChords(chordsA, chordsB) {
                const grid = $('fChords');
                grid.innerHTML = '';
                for (let i = 0; i < bars; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'bd-loop-cell';

                    const num = document.createElement('span');
                    num.className = 'bd-loop-cell-num';
                    num.textContent = (i + 1);
                    cell.appendChild(num);

                    const halves = document.createElement('div');
                    halves.className = 'bd-loop-cell-halves';
                    halves.appendChild(makeHalfInput(chordsA[String(i)] || '', i, 'a'));
                    halves.appendChild(makeHalfInput(chordsB[String(i)] || '', i, 'b'));

                    cell.appendChild(halves);
                    grid.appendChild(cell);
                }
            }

            function makeHalfInput(value, idx, half) {
                const inp = document.createElement('input');
                inp.type = 'text';
                inp.className = 'bd-loop-cell-half-input' + (value ? ' has-value' : '');
                inp.dataset.idx = idx;
                inp.dataset.half = half;
                inp.value = value;
                inp.placeholder = half === 'a' ? '+' : '·';
                inp.maxLength = 6;
                inp.autocomplete = 'off';
                inp.spellcheck = false;
                inp.oninput = function() {
                    inp.classList.toggle('has-value', !!inp.value.trim());
                };
                return inp;
            }

            function readChords() {
                const a = {}, b = {};
                document.querySelectorAll('#fChords input').forEach(function(inp) {
                    const v = inp.value.trim();
                    if (!v) return;
                    if (inp.dataset.half === 'a') a[inp.dataset.idx] = v;
                    else b[inp.dataset.idx] = v;
                });
                return { a: a, b: b };
            }

            // ─── Save / Delete ───
            async function savePreset() {
                const name = $('fName').value.trim();
                if (!name) { showFeedback('이름은 필수입니다', 'error'); return; }
                const chords = readChords();
                const data = {
                    name: name,
                    artist: $('fArtist').value.trim() || null,
                    bpm: parseInt($('fBpm').value, 10) || 90,
                    bars: bars,
                    rhythm: $('fRhythm').value,
                    bass_style: $('fBassStyle').value,
                    piano_style: $('fPianoStyle').value,
                    chords_a: chords.a,
                    chords_b: chords.b,
                    difficulty: difficulty > 0 ? difficulty : null,
                    genre: $('fGenre').value.trim() || null,
                };
                try {
                    let res;
                    if (editingId) {
                        res = await sb.from('presets').update(data).eq('id', editingId).select().single();
                    } else {
                        res = await sb.from('presets').insert(data).select().single();
                    }
                    if (res.error) throw res.error;
                    editingId = res.data.id;
                    $('formTitle').textContent = '편집: ' + res.data.name;
                    $('deleteBtn').style.display = 'inline-flex';
                    showFeedback('저장 완료 ✓', 'success');
                    await loadPresets();
                } catch (err) {
                    showFeedback('저장 실패: ' + (err.message || err), 'error');
                }
            }

            async function deletePreset() {
                if (!editingId) return;
                if (!confirm('이 프리셋을 삭제할까요?')) return;
                const res = await sb.from('presets').delete().eq('id', editingId);
                if (res.error) {
                    showFeedback('삭제 실패: ' + res.error.message, 'error');
                    return;
                }
                showFeedback('삭제됨', 'success');
                editingId = null;
                $('editForm').style.display = 'none';
                await loadPresets();
            }

            function testInTools() {
                if (!editingId) {
                    showFeedback('먼저 저장한 후에 미리보기 가능해요', 'error');
                    return;
                }
                window.open('tools.html?preset=' + editingId + '#backing', '_blank');
            }

            // ═══════════════════════════════════════════════════════
            //  Wire up
            // ═══════════════════════════════════════════════════════
            document.addEventListener('DOMContentLoaded', function() {
                setupPasscodeGate();

                $('loginBtn').onclick = startLogin;
                $('newBtn').onclick = newPreset;
                $('saveBtn').onclick = savePreset;
                $('deleteBtn').onclick = deletePreset;
                $('testBtn').onclick = testInTools;

                document.querySelectorAll('#fBars .bd-pill').forEach(function(b) {
                    b.onclick = function() {
                        bars = parseInt(b.dataset.bars, 10);
                        renderBars();
                        const cur = readChords();
                        renderChords(cur.a, cur.b);
                    };
                });
                document.querySelectorAll('#fDifficulty .bd-pill').forEach(function(b) {
                    b.onclick = function() {
                        difficulty = parseInt(b.dataset.diff, 10);
                        renderDifficulty();
                    };
                });

                // 검색
                const search = $('listSearch');
                const searchClear = $('listSearchClear');
                const searchWrap = $('listSearchWrap');
                search.oninput = function() {
                    listFilter = search.value;
                    searchWrap.classList.toggle('has-text', !!listFilter);
                    renderList();
                };
                searchClear.onclick = function() {
                    search.value = '';
                    listFilter = '';
                    searchWrap.classList.remove('has-text');
                    renderList();
                    search.focus();
                };
            });
        })();
    </script>
</body>
</html>
